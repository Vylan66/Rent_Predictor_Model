<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentScope - WA Rent Forecaster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9; /* Tailwind slate-100 */
        }
        .main-gradient-text {
            background: linear-gradient(to right, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        .form-input {
            background-color: #f8fafc; /* slate-50 */
            border-color: #cbd5e1; /* slate-300 */
            color: #0f172a; /* slate-900 */
        }
        .form-input:focus {
            --tw-ring-color: #4f46e5; /* indigo-600 */
            border-color: #4f46e5;
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <main class="w-full max-w-5xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-5xl font-extrabold text-slate-800">Forecasting algorithm draft</h1>
            <h2 class="text-xl text-slate-500 mt-2">RentScope | A visual representation</h2>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
            <!-- Left Card: Input Form -->
            <div class="bg-white p-8 rounded-2xl shadow-lg">
                <h3 class="text-xl font-bold text-slate-800 mb-6">Enter Your Tenancy Details</h3>
                <form id="prediction-form" class="space-y-5">
                    <div>
                        <label for="suburb" class="block text-sm font-medium text-slate-600">Suburb</label>
                        <select id="suburb" required class="form-input mt-1 block w-full p-3 border rounded-lg shadow-sm focus:ring-2 transition">
                             <option>Nedlands</option><option>Canning Vale</option><option>Joondalup</option><option>Fremantle</option><option>Perth CBD</option><option>Scarborough</option><option>Armadale</option><option>Victoria Park</option><option>Cottesloe</option><option>Kalamunda</option><option>Mandurah</option><option>Rockingham</option><option>Midland</option>
                        </select>
                    </div>
                    <div>
                        <label for="property_type" class="block text-sm font-medium text-slate-600">Property Type</label>
                        <select id="property_type" required class="form-input mt-1 block w-full p-3 border rounded-lg shadow-sm focus:ring-2 transition">
                            <option>House</option><option>Apartment</option><option>Townhouse</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="bedrooms" class="block text-sm font-medium text-slate-600">Bedrooms</label>
                            <input type="number" id="bedrooms" value="3" min="1" max="5" required class="form-input mt-1 block w-full p-3 border rounded-lg shadow-sm focus:ring-2 transition">
                        </div>
                        <div>
                            <label for="bathrooms" class="block text-sm font-medium text-slate-600">Bathrooms</label>
                            <input type="number" id="bathrooms" value="2" min="1" max="3" required class="form-input mt-1 block w-full p-3 border rounded-lg shadow-sm focus:ring-2 transition">
                        </div>
                    </div>
                    <div>
                        <label for="current_rent" class="block text-sm font-medium text-slate-600">Your Current Rent ($ per week)</label>
                        <input type="number" id="current_rent" value="650" min="100" step="10" required class="form-input mt-1 block w-full p-3 border rounded-lg shadow-sm focus:ring-2 transition">
                    </div>
                    <div>
                        <button type="submit" class="mt-4 w-full flex justify-center items-center bg-indigo-600 text-white font-bold py-4 px-4 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-300">
                            Get Your Forecast
                        </button>
                    </div>
                </form>
            </div>

            <!-- Right Card: Result Display Area -->
            <div id="result-card" class="bg-white p-8 rounded-2xl shadow-lg min-h-[480px] flex flex-col justify-center items-center text-center">
                 <div id="placeholder">
                    <svg class="mx-auto h-12 w-12 text-slate-300" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h12M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0118 16.5h-12a2.25 2.25 0 01-2.25-2.25V3m12.75 0v6.75a2.25 2.25 0 01-2.25 2.25H9.75a2.25 2.25 0 01-2.25-2.25V3m12.75 0h.008v.008h-.008V3z" /></svg>
                    <h3 class="mt-4 text-lg font-semibold text-slate-600">Your forecast will appear here</h3>
                    <p class="mt-1 text-slate-400">Fill out the form to get started.</p>
                 </div>
            </div>
        </div>
    </main>

    <script>
        const form = document.getElementById('prediction-form');
        const resultCard = document.getElementById('result-card');
        const placeholder = document.getElementById('placeholder');
        let forecastChart = null;
        
        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            
            placeholder.classList.add('hidden');
            resultCard.innerHTML = `<div class="flex flex-col justify-center items-center text-center text-slate-600"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500"></div><p class="mt-4">Analyzing market trends...</p></div>`;
            if (forecastChart) forecastChart.destroy();

            const data = {
                suburb: document.getElementById('suburb').value,
                property_type: document.getElementById('property_type').value,
                bedrooms: parseInt(document.getElementById('bedrooms').value),
                bathrooms: parseInt(document.getElementById('bathrooms').value),
                current_rent: parseInt(document.getElementById('current_rent').value)
            };

            try {
                const response = await fetch('http://127.0.0.1:5000/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `Server error: ${response.statusText}`);
                }
                const result = await response.json();
                displayResult(result, data.current_rent);
            } catch (error) {
                displayError(error);
            }
        });

        function displayResult(result, userRent) {
            const marketAverage = result.current_market_average;
            const difference = userRent - marketAverage;
            let comparisonText, comparisonColor, comparisonIcon;

            if (difference > 10) {
                comparisonText = `Paying ~$${Math.abs(difference).toFixed(0)} more than market average`;
                comparisonColor = 'text-red-600';
                comparisonIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm.707-10.293a1 1 0 00-1.414-1.414l-3 3a1 1 0 001.414 1.414L9 9.414V13a1 1 0 102 0V9.414l1.293 1.293a1 1 0 001.414-1.414l-3-3z" clip-rule="evenodd" /></svg>`;
            } else if (difference < -10) {
                comparisonText = `Paying ~$${Math.abs(difference).toFixed(0)} less than market average`;
                comparisonColor = 'text-green-600';
                comparisonIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm-.707-4.707a1 1 0 00-1.414 1.414l3 3a1 1 0 001.414-1.414L11 11.586V8a1 1 0 10-2 0v3.586L7.707 10.293a1 1 0 00-1.414 1.414l3 3z" clip-rule="evenodd" /></svg>`;
            } else {
                comparisonText = `Paying around the market average`;
                comparisonColor = 'text-slate-600';
                comparisonIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9 9a1 1 0 000 2h2a1 1 0 100-2H9z" clip-rule="evenodd" /></svg>`;
            }

            resultCard.innerHTML = `
                <div class="w-full fade-in">
                    <div class="grid grid-cols-2 gap-4 text-left">
                        <div class="bg-slate-50 p-4 rounded-lg">
                            <p class="text-sm text-slate-500 font-medium">Market Comparison</p>
                            <p class="text-lg font-bold ${comparisonColor} flex items-center mt-1">${comparisonIcon} ${comparisonText}</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-lg">
                            <p class="text-sm text-slate-500 font-medium">Next Increase Forecast</p>
                            <p class="text-lg font-bold text-indigo-600 mt-1">${result.next_increase_prediction}</p>
                        </div>
                    </div>
                    <div class="mt-6">
                        <p class="text-sm text-slate-500 font-medium text-left mb-2">18-Month Market Forecast for your property type</p>
                        <canvas id="forecast-chart"></canvas>
                    </div>
                </div>
            `;
            renderChart(result.forecast_chart_data);
        }

        function displayError(error) {
            resultCard.innerHTML = `<div class="fade-in text-red-700 text-center"><h3 class="font-bold text-lg">Prediction Failed</h3><p class="mt-1">Could not process the forecast request.</p><p class="mt-4 text-xs font-mono bg-red-100 p-2 rounded">${error.message}</p></div>`;
            setTimeout(() => {
                resultCard.innerHTML = '';
                placeholder.classList.remove('hidden');
            }, 6000);
        }

        function renderChart(chartData) {
            const ctx = document.getElementById('forecast-chart').getContext('2d');
            forecastChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.labels,
                    datasets: [{
                        label: 'Predicted Average Rent ($/wk)',
                        data: chartData.data,
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: '#4f46e5',
                        pointRadius: (context) => context.dataIndex === 0 ? 5 : 0,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: { callback: (value) => '$' + value }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>
